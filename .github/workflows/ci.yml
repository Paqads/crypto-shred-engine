name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Native TypeScript execution requires Node >= 23.6.
        node: ['24', 'latest']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Show versions
        run: node --version

      # No install step and no build step — the engine has zero dependencies
      # and Node runs the TypeScript sources directly.
      - name: Run tests
        run: node --test
